build_in: docker
machine: hieulerpi1
toolchain_type: EXTERNAL_TOOLCHAIN:aarch64
cache_src_dir:
no_layer: false
repos:
- yocto-poky
- yocto-meta-openembedded
local_conf: |+
  INIT_MANAGER = "systemd"

  DISTRO_FEATURES:append = " oebridge oe-xfce "
  SERVER_MIRROR = "https://mirrors.tuna.tsinghua.edu.cn/openeuler"
  SERVER_VERSION = "openEuler-24.03-LTS"
  GLIBC_GENERATE_LOCALES:append = "en_US.UTF-8 zh_CN.UTF-8 "
  IMAGE_INSTALL:append = " glibc-binary-localedata-en-us glibc-binary-localedata-zh-cn "

  DISTRO_FEATURES:append = " kernel6 "
  PREFERRED_VERSION_linux-openeuler ?= "6.6%"
  PREFERRED_VERSION_linux-openeuler-rt ?= "6.6%"

layers:
- yocto-meta-openeuler/bsp/meta-hisilicon
- yocto-meta-openembedded/meta-multimedia
docker_param:
  image: swr.cn-north-4.myhuaweicloud.com/openeuler-embedded/openeuler-container:latest
  parameters: -itd --network host
  volumns:
  - /dev/net/tun:/dev/net/tun
  command: bash
bitbake_cmds:
- bitbake openeuler-image
- bitbake openeuler-image -c do_populate_sdk
