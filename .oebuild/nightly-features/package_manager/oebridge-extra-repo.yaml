id: oebridge-extra-repo
name: openEuler extra repo
prompt: Add the extra openEuler bridge repository
config:
  local_conf:
    - 'DISTRO_FEATURES:append = " oebridge oe-extra "'
    - 'SERVER_MIRROR = "https://mirrors.tuna.tsinghua.edu.cn/openeuler"'
    - 'SERVER_VERSION = "openEuler-24.03-LTS"'
    - 'GLIBC_GENERATE_LOCALES:append = "en_US.UTF-8 zh_CN.UTF-8 "'
