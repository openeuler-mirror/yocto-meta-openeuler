id: rtos
name: MCS RTOS Samples
prompt: Enable RTOS-compatible components for MCS
dependencies: [mcs] # mcs/mcs
choice:
  - self/zephyr
  - self/uniproton

sub_feats:
  - id: zephyr
    machines: [qemu-aarch64, phytiumpi, kp920]
    config:
      layers:
        - yocto-meta-openeuler/rtos/meta-openeuler-rtos
        - yocto-meta-openeuler/rtos/meta-zephyr
      local_conf:
        - 'MCS_FEATURES:append = " zephyr "'
        # - 'MCS_FEATURES:kp920:append = " zephyr "'
        # - 'MCS_FEATURES:qemu-aarch64:append = " zephyr "'
  - id: uniproton
    machines: [qemu-aarch64, kp920]
    config:
      layers:
        - yocto-meta-openeuler/rtos/meta-openeuler-rtos
      local_conf:
        - 'MCS_FEATURES:append = " uniproton "'
