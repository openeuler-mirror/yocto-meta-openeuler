id: micrun
name: "Micrun: Mica OCI runtime(Xen mode mcs is recommended)"
prompt: Enable the Micrun shimv2 integration, compatible with containerd 1.7.19+, work for xen as hypervisor by default
machines: [qemu-aarch64]
dependencies: [mcs]
selects:
  - mcs/rtos
  - containerd # recommended

config:
  local_conf:
    - 'MCS_FEATURES:append = " micrun new_tty_suffix "'
