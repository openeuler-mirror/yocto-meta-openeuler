id: obmc
name: OpenBMC stack
prompt: Enable OpenBMC tooling
machines: [qemu-aarch64, raspberrypi4-64, visionfive2]
config:
  repos:
    - yocto-meta-phosphor
  layers:
    - yocto-meta-phosphor
  local_conf:
    - 'DISTRO_FEATURES:append = " obmc "'
    - 'INIT_MANAGER = "systemd"'
    - 'ROOT_HOME = "/home/root"'
