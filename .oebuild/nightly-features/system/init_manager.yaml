id: init-manager # full id is system/init_manager
name: Init manager
prompt: Select init manager
one_of:
  - self/busybox
  - self/systemd
  - self/sysvinit
  - self/none
default_one_of: self/sysvinit

sub_feats:
  - id: busybox
    name: BusyBox init
    config:
      local_conf:
        - 'INIT_MANAGER = "mdev-busybox"'
  - id: systemd
    name: systemd init
    config:
      local_conf:
        - 'INIT_MANAGER = "systemd"'
  - id: sysvinit
    name: SysV init
    config:
      local_conf:
        - 'INIT_MANAGER = "sysvinit"'
  - id: none
    name: No init
    config:
      local_conf:
        - 'INIT_MANAGER = "none"'
