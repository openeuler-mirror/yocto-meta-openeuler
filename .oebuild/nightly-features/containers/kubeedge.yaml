id: kubeedge
name: KubeEdge (work with iSulad by default)
prompt: Enable KubeEdge (remove isulad from DISTRO_FEATURES:append in conf/local.conf, if you do not wanna use iSulad)
selects:
  - containers/isulad
machines: [qemu-aarch64, raspberrypi4-64, hieulerpi1]
config:
  local_conf:
    - 'DISTRO_FEATURES:append = " kubeedge isulad"'
