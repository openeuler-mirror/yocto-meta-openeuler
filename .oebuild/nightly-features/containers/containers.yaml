id: containers
name: Container ability support
prompt: Enable basic container tools, and kernel configs
choice:
  - containers/isulad
  - containers/containerd
  - self/download # containers/containers/download

sub_feats:
  - id: download
    name: Manually download container engine
    prompt: >
      Use manually downloaded container engine at runtime
      do not build it in image

config:
  local_conf:
    - 'DISTRO_FEATURES:append = " virtualization containers "'
