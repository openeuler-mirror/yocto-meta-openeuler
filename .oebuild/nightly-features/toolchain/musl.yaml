id: musl
name: Musl libc toolchain
prompt: Build with musl
machines: [qemu-riscv64, qemu-aarch64, raspberrypi4-64, visionfive2]
config:
  layers:
    - yocto-meta-openeuler/meta-musl
  local_conf:
    - 'EXTERNAL_TARGET_SYS:aarch64 = "aarch64-openeuler-linux-musl"'
    - 'EXTERNAL_TARGET_SYS:riscv64 = "riscv64-openeuler-linux-musl"'
    - 'TCLIBC = "musl"'
    - 'TCMODE-LIBC = "musl"'
    - 'TCMODE-CRYPT = "musl"'
    - 'MACHINE_ESSENTIAL_EXTRA_RDEPENDS = "musl"'
