tag_name: arm32-clang-musl-toolchain-v0.1.0
name: openEuler Embedded ARM32 Clang+Musl Toolchain V0.1.0
body: 1.此发行版为openEuler Embedded ARM32 Clang+Musl交叉编译链V0.1.0版本。
      2.该编译链基于LLVM 19.1.7和musl 1.2.4构建，目标架构为arm-openeuler-linux-musleabi。
      3.编译链特性：使用Clang作为编译器、LLD作为链接器、musl作为C库、compiler-rt作为运行时库，适用于ARM32小型化场景。
      4.请先运行prepare.sh下载前置依赖（gcc-musl编译链、llvm-project源码、musl源码），再运行build-llvm-musl-arm32.sh构建编译链。
target_commitish: master
owner: openeuler
repo: yocto-meta-openeuler