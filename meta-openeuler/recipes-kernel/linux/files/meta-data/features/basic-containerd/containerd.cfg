#
# containerd toolkits runtime kconfigs appending
#
# This configuration is for basic containerd functionality.
# It includes necessary kernel options and some common optional features.
# For more advanced features, you may need to enable more kernel options.
#
CONFIG_IKCONFIG=y
CONFIG_IKCONFIG_PROC=y

#
# Generally Necessary for containerd
#
CONFIG_NAMESPACES=y
CONFIG_NET_NS=y
CONFIG_PID_NS=y
CONFIG_IPC_NS=y
CONFIG_UTS_NS=y
CONFIG_CGROUPS=y
CONFIG_CGROUP_CPUACCT=y
CONFIG_CGROUP_DEVICE=y
CONFIG_CGROUP_FREEZER=y
CONFIG_CGROUP_SCHED=y
CONFIG_CPUSETS=y
CONFIG_MEMCG=y
CONFIG_KEYS=y
CONFIG_VETH=m
CONFIG_BRIDGE=m
CONFIG_BRIDGE_NETFILTER=y
CONFIG_IP_NF_FILTER=m
CONFIG_IP_NF_MANGLE=m
CONFIG_IP_NF_TARGET_MASQUERADE=m
CONFIG_IP6_NF_FILTER=m
CONFIG_IP6_NF_MANGLE=m
CONFIG_IP6_NF_TARGET_MASQUERADE=m
CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=m
CONFIG_NETFILTER_XT_MATCH_CONNTRACK=m
CONFIG_NETFILTER_XT_MATCH_IPVS=m
CONFIG_NETFILTER_XT_MARK=m
CONFIG_IP_NF_RAW=m
CONFIG_IP_NF_NAT=m
CONFIG_NF_NAT=m
CONFIG_IP6_NF_RAW=m
CONFIG_IP6_NF_NAT=m
CONFIG_POSIX_MQUEUE=y
CONFIG_BPF_SYSCALL=y
CONFIG_CGROUP_BPF=y

#
# Optional Features
#

# cgroup pids controller
CONFIG_CGROUP_PIDS=y
# cgroup hugetlb controller
CONFIG_CGROUP_HUGETLB=y
# cgroup perf event controller
CONFIG_CGROUP_PERF=y
# cgroup net_cls subsystem. Classify network packets with a classid.
CONFIG_NET_CLS_CGROUP=m
# cgroup net_prio subsystem. Set the priority of network traffic.
CONFIG_CGROUP_NET_PRIO=y
# CPU bandwidth control for CFS task groups
CONFIG_CFS_BANDWIDTH=y
# Block device throttling
CONFIG_BLK_DEV_THROTTLING=y
CONFIG_BLK_CGROUP=y

# User namespace
CONFIG_USER_NS=y
# Seccomp filter
CONFIG_SECCOMP=y
CONFIG_SECCOMP_FILTER=y

# Redirecting packets and streams
CONFIG_IP_NF_TARGET_REDIRECT=m
# SCTP protocol support
CONFIG_IP_SCTP=m
# IP Virtual Server support
CONFIG_IP_VS=m
CONFIG_IP_VS_NFCT=y
CONFIG_IP_VS_PROTO_TCP=y
CONFIG_IP_VS_PROTO_UDP=y
CONFIG_IP_VS_RR=m

# Security modules
# SELinux support
CONFIG_SECURITY_SELINUX=y
# AppArmor security module
CONFIG_SECURITY_APPARMOR=y

# Netfilter Tables support
# This is a new packet filtering framework that is intended to replace iptables.
CONFIG_NF_TABLES=m
CONFIG_NFT_CT=m
CONFIG_NFT_FIB_IPV4=m
CONFIG_NFT_FIB_IPV6=m
CONFIG_NFT_FIB=m
CONFIG_NFT_MASQ=m
CONFIG_NFT_NAT=m

# Filesystem extended attributes and ACLs for ext3/ext4
CONFIG_EXT3_FS_XATTR=y
CONFIG_EXT3_FS_POSIX_ACL=y
CONFIG_EXT3_FS_SECURITY=y
CONFIG_EXT4_FS_POSIX_ACL=y
CONFIG_EXT4_FS_SECURITY=y

#
# Network Drivers
#

# For "overlay" network
CONFIG_VXLAN=m
CONFIG_BRIDGE_VLAN_FILTERING=y

# For "ipvlan" network
CONFIG_IPVLAN=m

# For "macvlan" network
CONFIG_MACVLAN=y
CONFIG_DUMMY=m

# Optional (for encrypted networks)
CONFIG_CRYPTO_AEAD=y
CONFIG_CRYPTO_GCM=m
CONFIG_CRYPTO_SEQIV=y
CONFIG_CRYPTO_GHASH=m
CONFIG_XFRM=y
CONFIG_XFRM_USER=y
CONFIG_XFRM_ALGO=y
CONFIG_INET_ESP=m
CONFIG_NETFILTER_XT_MATCH_BPF=m

# For ftp,tftp client in container
CONFIG_NF_NAT_FTP=m
CONFIG_NF_CONNTRACK_FTP=m
CONFIG_NF_NAT_TFTP=m
CONFIG_NF_CONNTRACK_TFTP=m
CONFIG_NF_DEFRAG_IPV6=m

#
# Storage Drivers
#

# For "overlay" storage driver
CONFIG_OVERLAY_FS=m

# For "btrfs" storage driver
CONFIG_BTRFS_FS=m
CONFIG_BTRFS_FS_POSIX_ACL=y
