require conf/machine/include/phytium-base.inc

MACHINE_FEATURES =. "pci serial usbhost ext2 ext3 ext4 efi"

# serial console setting
SERIAL_CONSOLES = "115200;ttyAMA1 115200;ttyAMA0"
SERIAL_CONSOLES_CHECK ?= "${SERIAL_CONSOLES}"

# The default fitimage requires the Image.gz file.
KERNEL_IMAGETYPE = "Image.gz"

# this FSTYPE is required for sdcard image generated by genimage
IMAGE_FSTYPES = "tar.gz ext4 genimage iso wic"

IMGCLASSES:append = " image_types_genimage"

# phytiumpi.config needs phyuboot to provide bootloader: fip-all.bin
EXTRA_IMAGEDEPENDS += "phyuboot"
GENIMAGE_CONFIG_FILE = "${BOOT}-${MACHINE}.config"

# efi, sdcard
BOOT = "${@bb.utils.contains('MACHINE_FEATURES', 'sd', 'sdcard', 'efi', d)}"
WKS_FILE = "efi-image-phytium.wks"
